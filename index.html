<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel Game Prototype</title>
    <link rel="stylesheet" href="theme.css" />
    <style>
      .game-panels .game-shell {
        width: min(1180px, 96vw);
      }

      .game-panels {
        --color-accent-primary: #72c8df;
        --color-accent-secondary: #e0b45a;
      }

      /* =========================
   TOP BAR / LAYOUT
   ========================= */

      .top-bar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 10px;
      }

      .top-bar-left,
      .top-bar-right {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      .top-bar-right {
        justify-content: flex-end;
      }

      .status-pill {
        padding: 7px 11px;
        border-radius: 999px;
        background: var(--color-surface-soft);
        border: 1px solid var(--color-border-soft);
        color: var(--color-text-muted);
        font-size: 0.83rem;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(640px, 1fr) 320px;
        gap: 14px;
        align-items: start;
      }

      .board-panel,
      .side-panel {
        padding: 14px;
      }

      .board-panel {
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 0;
        padding: 16px 16px 14px;
        border-radius: 26px;
        background: linear-gradient(
          180deg,
          rgba(56, 70, 102, 0.86) 0%,
          rgba(43, 55, 84, 0.92) 100%
        );
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.05),
          inset 0 0 36px rgba(231, 169, 90, 0.03),
          0 18px 40px rgba(0, 0, 0, 0.16);
        border: 1px solid
          color-mix(in srgb, var(--color-border-soft) 82%, transparent);
      }

      .side-panel {
        display: grid;
        gap: 10px;
        align-content: start;
        padding-top: 14px;
      }

      /* =========================
   RECENT WORD STRIP
   ========================= */

      .recent-strip-wrap {
        margin-bottom: 12px;
      }

      .recent-strip {
        min-height: 40px;
        display: flex;
        align-items: center;
        gap: 9px;
        overflow: hidden;
        white-space: nowrap;
        padding: 3px 2px;
      }

      .recent-strip__empty {
        color: var(--color-text-muted);
        font-size: 0.83rem;
        padding-left: 4px;
      }

      .recent-strip__item {
        flex: 0 0 auto;
        padding: 8px 13px;
        border-radius: 999px;
        background: color-mix(
          in srgb,
          var(--color-surface-soft) 88%,
          transparent
        );
        border: 1px solid
          color-mix(in srgb, var(--color-border-soft) 72%, transparent);
        color: var(--color-text);
        font-weight: var(--weight-semibold);
        letter-spacing: 0.01em;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
        font-size: 0.95rem;
      }

      .recent-strip__item--fresh {
        animation: recent-strip-pop 420ms ease-out;
      }

      @keyframes recent-strip-pop {
        0% {
          transform: translateY(6px) scale(0.96);
          opacity: 0.2;
          background: color-mix(
            in srgb,
            var(--color-accent-secondary) 30%,
            var(--color-surface-soft)
          );
        }
        100% {
          transform: translateY(0) scale(1);
          opacity: 1;
        }
      }

      /* =========================
   BOARD WRAP / STACK
   ========================= */

      .board-wrap {
        display: flex;
        justify-content: center;
        align-items: flex-start;
        width: 100%;
        margin-top: 8px;
        padding: 4px 0 0;
        overflow: hidden;
        position: relative;
      }

      .board-stack {
        position: relative;
        flex: 0 0 auto;
      }

      .panel-overlays {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 5;
      }

      /* =========================
   BOARD SURFACE
   ========================= */

      .board {
        display: grid;
        grid-template-columns: repeat(11, 46px);
        grid-template-rows: repeat(5, 46px);
        gap: 5px;
        padding: 14px;
        position: relative;
        isolation: isolate;
        overflow: hidden;
        border-radius: 28px;
        border: 1px solid
          color-mix(in srgb, var(--color-border-soft) 72%, transparent);
        background:
          radial-gradient(
            ellipse at center,
            rgba(231, 169, 90, 0.08) 0%,
            rgba(231, 169, 90, 0.03) 32%,
            rgba(0, 0, 0, 0) 68%
          ),
          radial-gradient(
            circle at 50% 50%,
            rgba(103, 203, 184, 0.07) 0%,
            rgba(34, 50, 84, 0.04) 34%,
            rgba(13, 20, 36, 0) 72%
          ),
          linear-gradient(
            180deg,
            rgba(24, 34, 56, 0.9) 0%,
            rgba(17, 24, 42, 0.96) 100%
          );
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.05),
          inset 0 0 56px rgba(103, 203, 184, 0.05),
          0 16px 36px rgba(0, 0, 0, 0.16);
      }

      .board::before {
        content: "";
        position: absolute;
        left: 14px;
        right: 14px;
        top: 50%;
        height: 52px;
        transform: translateY(-50%);
        pointer-events: none;
        border-radius: 999px;
        background: linear-gradient(
          90deg,
          rgba(231, 169, 90, 0) 0%,
          rgba(231, 169, 90, 0.06) 14%,
          rgba(255, 229, 170, 0.16) 30%,
          rgba(255, 239, 196, 0.22) 50%,
          rgba(255, 229, 170, 0.16) 70%,
          rgba(231, 169, 90, 0.06) 86%,
          rgba(231, 169, 90, 0) 100%
        );
        box-shadow:
          inset 0 0 14px rgba(255, 244, 213, 0.03),
          0 0 20px rgba(231, 169, 90, 0.08);
        filter: blur(10px);
      }

      .board::after {
        content: "";
        position: absolute;
        left: 50%;
        top: 50%;
        width: 88px;
        height: 88px;
        transform: translate(-50%, -50%);
        border-radius: 50%;
        pointer-events: none;
        z-index: 0;
        background: radial-gradient(
          circle,
          rgba(255, 239, 196, 0.24) 0%,
          rgba(231, 169, 90, 0.14) 26%,
          rgba(103, 203, 184, 0.07) 52%,
          rgba(103, 203, 184, 0) 76%
        );
        animation: board-center-pulse 2.8s ease-in-out infinite;
      }

      @keyframes board-center-pulse {
        0%,
        100% {
          opacity: 0.74;
          transform: translate(-50%, -50%) scale(0.96);
        }
        50% {
          opacity: 1;
          transform: translate(-50%, -50%) scale(1.04);
        }
      }

      /* =========================
   BOARD CELLS
   ========================= */

      .cell {
        position: relative;
        z-index: 1;
        border-radius: 11px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: var(--weight-bold);
        font-size: 1rem;
        color: var(--color-text);
        background: transparent;
        border: 1px solid transparent;
        box-shadow: none;
        transition:
          transform var(--transition-fast),
          filter var(--transition-fast),
          box-shadow var(--transition-fast),
          background var(--transition-fast),
          border-color var(--transition-fast),
          opacity var(--transition-fast);
      }

      .cell--middle-row {
        background: transparent;
        border-color: transparent;
        box-shadow: none;
      }

      .cell--center {
        background: transparent;
        border-color: transparent;
        box-shadow: none;
      }

      .cell--center::after {
        content: "";
        position: absolute;
        inset: 8px;
        border-radius: 14px;
        pointer-events: none;
        background: radial-gradient(
          circle,
          rgba(255, 235, 180, 0.34) 0%,
          rgba(231, 169, 90, 0.16) 45%,
          rgba(231, 169, 90, 0) 75%
        );
        animation: centerPulse 2.2s ease-in-out infinite;
      }

      @keyframes centerPulse {
        0%,
        100% {
          opacity: 0.65;
          transform: scale(0.96);
        }
        50% {
          opacity: 1;
          transform: scale(1);
        }
      }

      .cell--occupied {
        background: transparent;
        border-color: transparent;
        cursor: pointer;
      }

      .cell--occupied:hover,
      .cell--clickable:hover {
        filter: brightness(1.08);
      }

      .cell--overlap {
        z-index: 3;
      }

      .cell--clickable {
        cursor: pointer;
      }

      .cell-coords {
        display: none;
      }

      /* =========================
   BOARD PANELS
   ========================= */

      .panel-overlay {
        position: absolute;
        display: flex;
        border-radius: 10px;
        overflow: hidden;
        isolation: isolate;
        border: 1px solid
          color-mix(
            in srgb,
            var(--color-accent-primary) 22%,
            rgba(0, 0, 0, 0.22)
          );
        background: linear-gradient(
          180deg,
          color-mix(
            in srgb,
            var(--color-accent-primary) 28%,
            var(--color-surface-raised)
          ),
          color-mix(
            in srgb,
            var(--color-accent-primary) 16%,
            var(--color-surface-soft)
          )
        );
        box-shadow:
          0 8px 18px rgba(0, 0, 0, 0.3),
          inset 0 1px 0 rgba(255, 255, 255, 0.12);
        pointer-events: auto;
      }

      .panel-overlay--horizontal {
        flex-direction: row;
      }

      .panel-overlay--vertical {
        flex-direction: column;
      }

      .panel-overlay__segment {
        display: flex;
        align-items: center;
        justify-content: center;
        flex: 1 1 auto;
        min-width: 0;
        min-height: 0;
        position: relative;
        background: linear-gradient(
          180deg,
          color-mix(in srgb, var(--color-accent-primary) 34%, white 8%) 0%,
          color-mix(
              in srgb,
              var(--color-accent-primary) 58%,
              var(--color-surface-raised) 42%
            )
            100%
        );
        transition:
          background 160ms ease,
          box-shadow 160ms ease,
          transform 160ms ease;
      }

      .panel-overlay__segment + .panel-overlay__segment {
        border-left: 1px solid rgba(255, 255, 255, 0.05);
      }

      .panel-overlay--vertical
        .panel-overlay__segment
        + .panel-overlay__segment {
        border-left: none;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
      }

      .panel-overlay__segment--middle,
      .tray-piece__segment--middle {
        background: linear-gradient(
          180deg,
          color-mix(in srgb, var(--color-accent-primary) 42%, white 8%) 0%,
          color-mix(
              in srgb,
              var(--color-accent-primary) 64%,
              var(--color-surface-raised) 36%
            )
            100%
        );
        box-shadow:
          inset 0 0 0 1px
            color-mix(in srgb, rgba(255, 255, 255, 0.1) 70%, transparent),
          inset 0 2px 3px rgba(255, 255, 255, 0.06);
        z-index: 1;
      }

      .panel-overlay__letter {
        font-weight: var(--weight-bold);
        font-size: 1.08rem;
        line-height: 1;
        color: color-mix(in srgb, var(--color-text) 92%, black 8%);
        text-shadow: 0 1px 0 rgba(0, 0, 0, 0.18);
        user-select: none;
        transition:
          color 160ms ease,
          text-shadow 160ms ease;
      }

      .panel-overlay__segment--in-middle-row {
        background: linear-gradient(
          180deg,
          color-mix(in srgb, var(--color-accent-secondary) 34%, white 18%) 0%,
          color-mix(
              in srgb,
              var(--color-accent-primary) 52%,
              var(--color-accent-secondary) 48%
            )
            100%
        );
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.18),
          0 0 14px rgba(231, 169, 90, 0.1);
      }

      .panel-overlay__segment--in-middle-row.panel-overlay__segment--middle {
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.22),
          0 0 18px rgba(231, 169, 90, 0.14);
      }

      .panel-overlay__letter--in-middle-row {
        color: rgba(255, 248, 232, 0.99);
        text-shadow: 0 0 6px rgba(255, 226, 170, 0.18);
      }

      /* Preview */
      .panel-overlay--preview {
        opacity: 0.58;
        border-style: solid;
        border-color: color-mix(
          in srgb,
          var(--color-accent-primary) 42%,
          transparent
        );
        box-shadow:
          0 0 0 1px
            color-mix(in srgb, var(--color-accent-primary) 18%, transparent),
          0 8px 18px rgba(0, 0, 0, 0.16);
        filter: saturate(0.9);
        transform: translateY(-2px);
        transition:
          left 500ms ease-out,
          top 500ms ease-out,
          width 500ms ease-out,
          height 500ms ease-out,
          transform 500ms ease-out;
        will-change: left, top, width, height, transform;
      }

      .panel-overlay--preview .panel-overlay__segment {
        background: linear-gradient(
          180deg,
          color-mix(in srgb, var(--color-accent-primary) 28%, transparent),
          color-mix(in srgb, var(--color-accent-primary) 12%, transparent)
        );
      }

      .panel-overlay--preview .panel-overlay__segment--middle {
        background: linear-gradient(
          180deg,
          color-mix(in srgb, var(--color-accent-primary) 38%, transparent),
          color-mix(in srgb, var(--color-accent-primary) 18%, transparent)
        );
      }

      .panel-overlay--preview .panel-overlay__segment--in-middle-row {
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.14),
          0 0 14px rgba(118, 212, 255, 0.1);
      }

      .panel-overlay--preview .panel-overlay__segment,
      .panel-overlay--preview .panel-overlay__letter {
        transition:
          transform 500ms ease-out,
          opacity 500ms ease-out;
      }

      .panel-overlay--preview-illegal {
        border-color: color-mix(in srgb, var(--color-error) 48%, transparent);
        box-shadow:
          0 0 0 1px color-mix(in srgb, var(--color-error) 18%, transparent),
          0 8px 18px rgba(0, 0, 0, 0.16);
        transition:
          left 65ms ease-out,
          top 65ms ease-out,
          width 65ms ease-out,
          height 65ms ease-out,
          transform 65ms ease-out;
      }

      .panel-overlay--preview-illegal .panel-overlay__segment {
        background: linear-gradient(
          180deg,
          color-mix(in srgb, var(--color-error) 22%, transparent),
          color-mix(in srgb, var(--color-error) 10%, transparent)
        );
      }

      .panel-overlay--preview-illegal .panel-overlay__segment--middle {
        background: linear-gradient(
          180deg,
          color-mix(in srgb, var(--color-error) 30%, transparent),
          color-mix(in srgb, var(--color-error) 14%, transparent)
        );
      }

      /* Rotation / placement FX */
      .panel-overlay--rotating,
      .tray-piece--rotating {
        animation: panel-rotate-body 170ms ease-out;
        transform-origin: center center;
      }

      .panel-overlay--rotating .panel-overlay__letter,
      .tray-piece--rotating .tray-piece__letter {
        animation: panel-rotate-letter 170ms ease-out;
      }

      .panel-overlay--settling {
        animation: panel-settle 140ms ease-out;
      }

      @keyframes panel-rotate-body {
        from {
          transform: rotate(var(--panel-rotate-from)) scale(0.96);
          opacity: 0.94;
        }
        to {
          transform: rotate(0deg) scale(1);
          opacity: 1;
        }
      }

      @keyframes panel-rotate-letter {
        from {
          transform: rotate(var(--panel-letter-rotate-from));
        }
        to {
          transform: rotate(0deg);
        }
      }

      @keyframes panel-settle {
        0% {
          transform: translateY(-7px) scale(1.012);
        }
        65% {
          transform: translateY(1px) scale(0.998);
        }
        100% {
          transform: translateY(0) scale(1);
        }
      }

      /* =========================
   TRAY
   ========================= */

      .tray-block {
        margin-top: 14px;
        padding-top: 16px;
        position: relative;
      }

      .tray-block::before {
        content: "";
        position: absolute;
        top: 0;
        left: 18px;
        right: 18px;
        height: 1px;
        border-radius: 999px;
        background: linear-gradient(
          90deg,
          transparent 0%,
          rgba(255, 255, 255, 0.08) 14%,
          rgba(135, 170, 220, 0.14) 50%,
          rgba(255, 255, 255, 0.08) 86%,
          transparent 100%
        );
      }

      .panels-list {
        display: grid;
        gap: 10px;
      }

      .panels-list--tray {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        padding: 12px;
        border-radius: 22px;
        min-height: 138px;
        background: linear-gradient(
          180deg,
          rgba(20, 31, 52, 0.74) 0%,
          rgba(15, 25, 44, 0.84) 100%
        );
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.035),
          inset 0 0 24px rgba(103, 203, 184, 0.05);
        border: 1px solid
          color-mix(in srgb, var(--color-border-soft) 60%, transparent);
        align-items: stretch;
      }

      .panels-list--hot {
        border-color: color-mix(
          in srgb,
          var(--color-accent-secondary) 40%,
          transparent
        );
        box-shadow:
          0 0 0 2px
            color-mix(in srgb, var(--color-accent-secondary) 14%, transparent),
          inset 0 1px 0 rgba(255, 255, 255, 0.03),
          inset 0 0 0 1px rgba(255, 255, 255, 0.02);
        filter: brightness(1.04);
      }

      .tray-slot {
        min-height: 104px;
        border-radius: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        padding: 9px;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.03) 0%,
          rgba(255, 255, 255, 0.015) 100%
        );
        border: 1px solid rgba(255, 255, 255, 0.055);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.025),
          0 6px 16px rgba(0, 0, 0, 0.1);
        transition:
          border-color var(--transition-fast),
          box-shadow var(--transition-fast),
          transform var(--transition-fast),
          background var(--transition-fast);
      }

      .tray-slot:hover {
        border-color: color-mix(
          in srgb,
          var(--color-accent-primary) 20%,
          rgba(255, 255, 255, 0.05)
        );
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.03),
          0 10px 18px rgba(0, 0, 0, 0.12);
      }

      .tray-slot--selected {
        border-color: color-mix(
          in srgb,
          var(--color-accent-primary) 26%,
          rgba(255, 255, 255, 0.06)
        );
        background: linear-gradient(
          180deg,
          rgba(115, 184, 222, 0.06) 0%,
          rgba(255, 255, 255, 0.02) 100%
        );
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.04),
          0 10px 22px rgba(0, 0, 0, 0.14);
      }

      .tray-slot--empty {
        opacity: 1;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.018) 0%,
          rgba(255, 255, 255, 0.012) 100%
        );
        border-color: rgba(255, 255, 255, 0.04);
      }

      .tray-slot--empty:hover {
        transform: none;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.02),
          0 6px 16px rgba(0, 0, 0, 0.1);
      }

      .tray-piece {
        display: flex;
        border-radius: 10px;
        overflow: hidden;
        border: 1px solid
          color-mix(
            in srgb,
            var(--color-accent-primary) 22%,
            rgba(0, 0, 0, 0.22)
          );
        background: linear-gradient(
          180deg,
          color-mix(
            in srgb,
            var(--color-accent-primary) 28%,
            var(--color-surface-raised)
          ),
          color-mix(
            in srgb,
            var(--color-accent-primary) 16%,
            var(--color-surface-soft)
          )
        );
        box-shadow:
          0 6px 14px rgba(0, 0, 0, 0.24),
          inset 0 1px 0 rgba(255, 255, 255, 0.12);
      }

      .tray-piece--horizontal {
        flex-direction: row;
      }

      .tray-piece--vertical {
        flex-direction: column;
      }

      .tray-piece__segment {
        width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(
          180deg,
          color-mix(in srgb, var(--color-accent-primary) 34%, white 8%) 0%,
          color-mix(
              in srgb,
              var(--color-accent-primary) 58%,
              var(--color-surface-raised) 42%
            )
            100%
        );
      }

      .tray-piece__segment + .tray-piece__segment {
        border-left: 1px solid rgba(255, 255, 255, 0.05);
      }

      .tray-piece--vertical .tray-piece__segment + .tray-piece__segment {
        border-left: none;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
      }

      .tray-piece__letter {
        font-weight: var(--weight-bold);
        font-size: 1.02rem;
        line-height: 1;
        color: color-mix(in srgb, var(--color-text) 92%, black 8%);
        text-shadow: 0 1px 0 rgba(0, 0, 0, 0.18);
        user-select: none;
      }

      /* Disable native dragging/selecting */
      .panel-overlay,
      .panel-overlay__segment,
      .panel-overlay__letter,
      .tray-slot,
      .tray-piece,
      .tray-piece__segment,
      .tray-piece__letter {
        user-select: none;
        -webkit-user-select: none;
        -webkit-user-drag: none;
        touch-action: none;
      }

      /* =========================
   FOUND WORD FX
   ========================= */

      .panel-overlay__segment--found-scan {
        position: relative;
        overflow: hidden;
      }

      .panel-overlay__segment--found-scan::before {
        content: "";
        position: absolute;
        inset: -2px;
        background: linear-gradient(
          90deg,
          transparent 0%,
          rgba(160, 235, 255, 0) 18%,
          rgba(160, 235, 255, 0.72) 48%,
          rgba(160, 235, 255, 0) 82%,
          transparent 100%
        );
        transform: translateX(-170%);
        animation: overlay-found-scan-sweep 240ms ease-out forwards;
        animation-delay: calc(var(--scan-index, 0) * 28ms);
        pointer-events: none;
        z-index: 2;
      }

      .panel-overlay__segment--found-scan::after {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(160, 235, 255, 0.18);
        opacity: 0;
        animation: overlay-found-scan-pop 260ms ease-out forwards;
        animation-delay: 210ms;
        pointer-events: none;
        z-index: 1;
      }

      @keyframes overlay-found-scan-sweep {
        0% {
          transform: translateX(-170%);
          opacity: 0;
        }
        25% {
          opacity: 1;
        }
        100% {
          transform: translateX(170%);
          opacity: 0.92;
        }
      }

      @keyframes overlay-found-scan-pop {
        0% {
          opacity: 0;
          transform: scale(1);
          box-shadow: none;
        }
        35% {
          opacity: 1;
          transform: scale(1.03);
          box-shadow:
            0 0 0 8px rgba(120, 220, 255, 0.1),
            0 0 20px rgba(120, 220, 255, 0.22);
        }
        100% {
          opacity: 0;
          transform: scale(1);
          box-shadow: none;
        }
      }

      .found-word-toast {
        position: absolute;
        left: 50%;
        top: -10px;
        transform: translateX(-50%);
        padding: 8px 14px;
        border-radius: 999px;
        background: color-mix(
          in srgb,
          var(--color-highlight-soft) 92%,
          rgba(20, 28, 36, 0.55)
        );
        border: 1px solid
          color-mix(in srgb, var(--color-accent-secondary) 28%, transparent);
        box-shadow:
          0 12px 24px rgba(0, 0, 0, 0.22),
          0 0 18px rgba(120, 220, 255, 0.12);
        color: var(--color-text);
        font-weight: 700;
        letter-spacing: 0.04em;
        pointer-events: none;
        animation: found-word-toast-rise 620ms ease-out forwards;
        z-index: 1200;
      }

      @keyframes found-word-toast-rise {
        0% {
          opacity: 0;
          transform: translateX(-50%) translateY(10px) scale(0.96);
        }
        18% {
          opacity: 1;
          transform: translateX(-50%) translateY(0) scale(1);
        }
        100% {
          opacity: 0;
          transform: translateX(-50%) translateY(-20px) scale(1.01);
        }
      }

      /* =========================
   MESSAGES
   ========================= */

      .error-box,
      .success-box {
        margin-top: 10px;
        padding: 11px 13px;
        border-radius: var(--radius-md);
        border: 1px solid var(--color-border-soft);
      }

      .error-box {
        color: #ffd7d7;
        border-color: color-mix(in srgb, var(--color-error) 40%, transparent);
        background: color-mix(
          in srgb,
          var(--color-error) 12%,
          var(--color-surface-soft)
        );
      }

      .success-box {
        color: #dff7e6;
        border-color: color-mix(in srgb, var(--color-success) 40%, transparent);
        background: color-mix(
          in srgb,
          var(--color-success) 12%,
          var(--color-surface-soft)
        );
      }

      .hidden {
        display: none !important;
      }

      /* =========================
   SIDEBAR
   ========================= */

      #countsList {
        display: grid;
        gap: 10px;
      }

      .count-accordion-item {
        border-radius: 16px;
        background: color-mix(
          in srgb,
          var(--color-surface-soft) 82%,
          transparent
        );
        border: 1px solid
          color-mix(in srgb, var(--color-border-soft) 68%, transparent);
        overflow: hidden;
      }

      .count-accordion-item--empty {
        padding: 13px 15px;
        color: var(--color-text-muted);
      }

      .count-accordion-button {
        width: 100%;
        background: transparent;
        border: none;
        color: inherit;
        text-align: left;
        padding: 12px 14px 10px;
        cursor: pointer;
        display: grid;
        gap: 10px;
      }

      .count-accordion-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
      }

      .count-accordion-left {
        display: flex;
        align-items: baseline;
        gap: 8px;
        min-width: 0;
      }

      .count-accordion-length {
        font-size: 1.7rem;
        line-height: 1;
        font-weight: 800;
        color: var(--color-text);
      }

      .count-accordion-length-label {
        font-size: 0.9rem;
        color: var(--color-text-muted);
        white-space: nowrap;
      }

      .count-accordion-right {
        text-align: right;
        display: grid;
        gap: 2px;
      }

      .count-accordion-found {
        font-size: 0.95rem;
        font-weight: 700;
        color: color-mix(in srgb, var(--color-text) 96%, white 4%);
      }

      .count-accordion-remaining {
        font-size: 0.84rem;
        color: var(--color-text-muted);
      }

      .count-accordion-bar {
        width: 100%;
        height: 9px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        overflow: hidden;
      }

      .count-accordion-bar-fill {
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(
          90deg,
          color-mix(in srgb, var(--color-accent-secondary) 72%, white 6%),
          color-mix(in srgb, var(--color-accent-secondary) 92%, white 10%)
        );
        transition: width 220ms ease-out;
      }

      .count-accordion-detail {
        padding: 12px 14px;
        background: color-mix(
          in srgb,
          white 78%,
          var(--color-accent-primary) 6%
        );
        color: #1c2430;
        border-top: 1px solid rgba(255, 255, 255, 0.06);
        display: grid;
        gap: 5px;
      }

      .count-accordion-detail-row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        font-size: 0.9rem;
      }

      .count-accordion-detail-start {
        font-weight: 800;
        color: #233042;
      }

      .count-accordion-detail-count {
        font-weight: 600;
        color: #314257;
      }

      .count-accordion-detail-empty {
        color: #314257;
        font-size: 0.88rem;
      }

      /* =========================
   MODAL
   ========================= */

      .modal {
        position: fixed;
        inset: 0;
        z-index: 2000;
      }

      .modal-backdrop {
        position: absolute;
        inset: 0;
        background: rgba(7, 10, 16, 0.62);
        backdrop-filter: blur(4px);
      }

      .modal-dialog {
        position: relative;
        width: min(760px, 92vw);
        max-height: 82vh;
        margin: 6vh auto 0;
        padding: 16px;
        border-radius: 24px;
        background: linear-gradient(
          180deg,
          color-mix(in srgb, var(--color-surface-raised) 92%, black 8%),
          color-mix(in srgb, var(--color-surface-soft) 92%, black 8%)
        );
        border: 1px solid var(--color-border-soft);
        box-shadow: 0 24px 64px rgba(0, 0, 0, 0.34);
        overflow: hidden;
      }

      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 12px;
      }

      .all-words-list {
        max-height: calc(82vh - 90px);
        overflow: auto;
        display: grid;
        gap: 14px;
        padding-right: 4px;
      }

      .all-words-group {
        display: grid;
        gap: 9px;
      }

      .all-words-group__title {
        font-weight: 700;
        color: var(--color-text);
      }

      .all-words-group__grid {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .all-words-pill {
        padding: 7px 11px;
        border-radius: 999px;
        background: color-mix(
          in srgb,
          var(--color-highlight-soft) 86%,
          transparent
        );
        border: 1px solid
          color-mix(in srgb, var(--color-border-soft) 70%, transparent);
        font-weight: 600;
      }

      .all-words-empty {
        color: var(--color-text-muted);
        padding: 8px 2px;
      }

      .how-to-play-dialog {
        width: min(520px, 92vw);
        max-height: unset;
      }

      .how-to-play-body {
        display: grid;
        gap: 10px;
        color: var(--color-text);
      }

      .how-to-play-body p {
        margin: 0;
        font-size: 0.98rem;
        line-height: 1.45;
      }

      /* =========================
   RESPONSIVE
   ========================= */

      @media (max-width: 980px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .board {
          grid-template-columns: repeat(11, minmax(0, 38px));
          grid-template-rows: repeat(5, 38px);
        }

        .panels-list--tray {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 620px) {
        .board {
          gap: 4px;
          padding: 8px;
        }

        .cell {
          font-size: 0.92rem;
        }

        .panels-list--tray {
          grid-template-columns: 1fr;
        }

        .recent-strip {
          gap: 8px;
        }

        .recent-strip__item {
          padding: 8px 12px;
        }
      }
    /* =========================
   MOBILE FIT / BOARD METRICS OVERRIDES
   Put this at the END of the game-specific <style> block.
   ========================= */

.game-panels {
  --pg-cell-size: 46px;
  --pg-cell-gap: 5px;
  --pg-board-padding: 14px;
}

/* Make CSS board geometry use variables that JS can also read. */
.board {
  grid-template-columns: repeat(11, var(--pg-cell-size));
  grid-template-rows: repeat(5, var(--pg-cell-size));
  gap: var(--pg-cell-gap);
  padding: var(--pg-board-padding);
}

/* Prevent mobile browsers from stealing panel gestures as page scroll. */
.board,
.board-stack,
.panel-overlays,
.panel-overlay,
.panel-overlay *,
.tray-slot,
.tray-slot *,
.tray-piece,
.tray-piece * {
  user-select: none;
  -webkit-user-select: none;
  -webkit-user-drag: none;
  touch-action: none;
}

/* Tablet-ish size */
@media (max-width: 980px) {
  .game-panels {
    --pg-cell-size: 34px;
    --pg-cell-gap: 4px;
    --pg-board-padding: 10px;
  }

  .game-panels .game-shell {
    width: min(100vw, 760px);
    padding-left: 10px;
    padding-right: 10px;
  }

  .layout {
    grid-template-columns: 1fr;
  }

  .board-panel,
  .side-panel {
    padding: 12px;
  }

  .panels-list--tray {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}

/* Phone size */
@media (max-width: 620px) {
  .game-panels {
    --pg-cell-size: 25px;
    --pg-cell-gap: 3px;
    --pg-board-padding: 8px;
  }

  .game-panels .game-shell {
    width: 100vw;
    max-width: 100vw;
    padding: 8px;
    box-sizing: border-box;
  }

  .game-frame {
    grid-template-columns: 1fr !important;
    gap: 0;
  }

  .game-title-rail {
    display: none;
  }

  .game-panel {
    width: 100%;
    min-width: 0;
  }

  .top-bar {
    gap: 8px;
    margin-bottom: 8px;
  }

  .top-bar-left,
  .top-bar-right {
    gap: 8px;
  }

  .button {
    padding: 8px 11px;
    font-size: 0.88rem;
    border-radius: 13px;
  }

  .status-pill {
    padding: 7px 10px;
    font-size: 0.8rem;
  }

  .recent-strip-wrap {
    margin-bottom: 8px;
  }

  .recent-strip {
    min-height: 34px;
    gap: 7px;
    overflow-x: auto;
    overflow-y: hidden;
    scrollbar-width: none;
  }

  .recent-strip::-webkit-scrollbar {
    display: none;
  }

  .recent-strip__item {
    padding: 7px 10px;
    font-size: 0.82rem;
  }

  .layout {
    grid-template-columns: 1fr;
    gap: 10px;
  }

  .board-panel {
    padding: 10px;
    border-radius: 22px;
  }

  .board-wrap {
    margin-top: 0;
    padding-top: 0;
    overflow: visible;
  }

  .board {
    border-radius: 22px;
  }

  .cell {
    border-radius: 7px;
    font-size: 0.78rem;
  }

  .panel-overlay__letter,
  .tray-piece__letter {
    font-size: 0.82rem;
  }

  .side-panel {
    padding: 10px;
  }

  .tray-block {
    margin-top: 8px;
    padding-top: 10px;
  }

  .panels-list--tray {
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
    padding: 8px;
    min-height: 96px;
  }

  .tray-slot {
    min-height: 72px;
    padding: 6px;
    border-radius: 15px;
  }
}

/* Very narrow phones */
@media (max-width: 380px) {
  .game-panels {
    --pg-cell-size: 24px;
    --pg-cell-gap: 3px;
    --pg-board-padding: 7px;
  }

  .game-panels .game-shell {
    padding-left: 6px;
    padding-right: 6px;
  }

  .board-panel {
    padding: 8px;
  }
}

  </head>
  <body class="game-panels">
    <div class="game-shell">
      <div class="game-frame">
        <div class="game-title-rail">
          <h1 class="game-title-vertical">Scrabble 2</h1>
        </div>

        <div class="game-panel">
          <div class="top-bar">
            <div class="top-bar-left">
              <button id="loadPuzzleBtn" class="button button--primary">
                Load Puzzle
              </button>
              <button id="clearBoardBtn" class="button">Clear Board</button>
              <button id="howToPlayBtn" class="button">How to Play</button>
            </div>

            <div class="top-bar-right">
              <button
                id="openAllWordsBtn"
                class="button button--small"
                type="button"
              >
                View all
              </button>
              <div id="foundCountPill" class="status-pill">Found: 0</div>
            </div>
          </div>

          <div class="recent-strip-wrap">
            <div id="recentList" class="recent-strip"></div>
          </div>

          <div class="layout">
            <section class="panel board-panel">
              <div class="board-wrap">
                <div class="board-stack">
                  <div id="board" class="board"></div>
                  <div id="panelOverlays" class="panel-overlays"></div>
                </div>
              </div>

              <div id="messageBox" class="error-box hidden"></div>
              <div id="winBox" class="success-box hidden">Puzzle solved.</div>

              <div class="tray-block">
                <div
                  id="panelsList"
                  class="panels-list panels-list--tray"
                ></div>
              </div>
            </section>

            <section class="panel side-panel">
              <div
                id="countsList"
                class="counts-list counts-list--accordion"
              ></div>
            </section>
          </div>
        </div>
      </div>
    </div>
    <div id="allWordsModal" class="modal hidden" aria-hidden="true">
      <div class="modal-backdrop" id="allWordsModalBackdrop"></div>
      <div
        class="modal-dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="allWordsModalTitle"
      >
        <div class="modal-header">
          <h2 id="allWordsModalTitle" class="section-title">Found Words</h2>
          <button id="closeAllWordsBtn" class="button" type="button">
            Close
          </button>
        </div>
        <div id="allWordsList" class="all-words-list"></div>
      </div>
    </div>
    <div id="howToPlayModal" class="modal hidden" aria-hidden="true">
      <div class="modal-backdrop" id="howToPlayBackdrop"></div>
      <div
        class="modal-dialog how-to-play-dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="howToPlayTitle"
      >
        <div class="modal-header">
          <h2 id="howToPlayTitle" class="section-title">How to Play</h2>
        </div>
        <div class="how-to-play-body">
          <p>
            Rotate and arrange the panels as needed to make words in the middle
            highlighted row. Make sure your word occupies the very center spot.
            You can hide one letter by covering it with another. You cannot hide
            a panel's center letter.
          </p>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
